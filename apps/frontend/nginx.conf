server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Streaming endpoint — disable buffering so NDJSON tokens reach the browser immediately.
    # proxy_read_timeout is extended beyond the default 60s because large-context LLM
    # generations (or Ollama on CPU) can take several minutes; the default would silently
    # close the connection mid-stream and the user would see a truncated answer.
    location /api/stream_query {
        proxy_pass http://backend:8000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_buffering off;
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
        add_header X-Accel-Buffering no;
    }

    # All other API calls
    location /api/ {
        proxy_pass http://backend:8000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # SPA fallback — all non-asset routes serve index.html
    location / {
        try_files $uri $uri/ /index.html;
    }
}
