services:
  qdrant:
    image: qdrant/qdrant:latest
    ports:
      - "6333:6333"
    volumes:
      - ./qdrant_storage:/qdrant/storage
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:6333/healthz || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  backend:
    build:
      context: ./apps/backend
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    env_file: .env
    environment:
      - DB_PATH=/app/data/ragapp.db
    depends_on:
      qdrant:
        condition: service_healthy
    volumes:
      - ./uploads:/app/uploads
      - app_data:/app/data
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8000/api/llm_config || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  inngest:
    image: node:20-slim
    command: >
      npx --yes inngest-cli@latest dev
      -u http://backend:8000/api/inngest
      --no-discovery
      --port 8288
      --host 0.0.0.0
    ports:
      - "8288:8288"
    depends_on:
      backend:
        condition: service_healthy

  frontend:
    build:
      context: ./apps/frontend
      dockerfile: Dockerfile
    ports:
      - "80:80"
    depends_on:
      backend:
        condition: service_healthy

volumes:
  app_data:
