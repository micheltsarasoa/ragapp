version: "3.9"

services:
  qdrant:
    image: qdrant/qdrant:latest
    ports:
      - "6333:6333"
    volumes:
      - ./qdrant_storage:/qdrant/storage

  api:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    env_file: .env
    depends_on:
      - qdrant
    volumes:
      - ./uploads:/app/uploads
      - ./ragapp.db:/app/ragapp.db

  ui:
    build:
      context: .
      dockerfile: Dockerfile
    command:
      [
        "streamlit", "run", "streamlit_app.py",
        "--server.port=8501",
        "--server.address=0.0.0.0"
      ]
    ports:
      - "8501:8501"
    env_file: .env
    environment:
      - API_BASE=http://api:8000
      - INNGEST_API_BASE=http://host.docker.internal:8288/v1
    depends_on:
      - api
    volumes:
      - ./uploads:/app/uploads
      - ./ragapp.db:/app/ragapp.db

# NOTE: The Inngest dev server is not containerised here because it's a
# Node.js CLI tool intended for local development only.
# Run it on the host with:
#   npx inngest-cli@latest dev -u http://127.0.0.1:8000/api/inngest --no-discovery
# For production, follow https://www.inngest.com/docs/deploy
