services:
  qdrant:
    image: qdrant/qdrant:latest
    ports:
      - "6333:6333"
    volumes:
      - ./qdrant_storage:/qdrant/storage
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:6333/healthz || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  api:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    env_file: .env
    environment:
      - DB_PATH=/app/data/ragapp.db
    depends_on:
      qdrant:
        condition: service_healthy
    volumes:
      - ./uploads:/app/uploads
      - app_data:/app/data
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8000/api/llm_config || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  inngest:
    image: node:20-slim
    command: >
      npx --yes inngest-cli@latest dev
      -u http://api:8000/api/inngest
      --no-discovery
      --port 8288
      --host 0.0.0.0
    ports:
      - "8288:8288"
    depends_on:
      api:
        condition: service_healthy

  ui:
    build:
      context: .
      dockerfile: Dockerfile
    command:
      [
        "streamlit", "run", "streamlit_app.py",
        "--server.port=8501",
        "--server.address=0.0.0.0"
      ]
    ports:
      - "8501:8501"
    env_file: .env
    environment:
      - API_BASE=http://api:8000
      - INNGEST_API_BASE=http://inngest:8288/v1
    depends_on:
      api:
        condition: service_healthy
    volumes:
      - ./uploads:/app/uploads
      - app_data:/app/data

volumes:
  app_data:
